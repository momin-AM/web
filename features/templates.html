<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Document Downloads</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f9;
      margin: 0;
      padding: 40px;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      gap: 20px;
    }
    .doc-card {
      background: #fff;
      border-radius: 10px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
      width: 250px;
      padding: 20px;
      text-align: center;
      transition: transform 0.2s ease;
    }
    .doc-card:hover {
      transform: translateY(-5px);
    }
    .doc-title {
      font-size: 18px;
      font-weight: bold;
      margin-bottom: 15px;
      color: #333;
    }
    .download-btn {
      display: inline-block;
      padding: 10px 20px;
      background: #0078d7;
      color: #fff;
      border: none;
      border-radius: 5px;
      text-decoration: none;
      font-size: 14px;
      cursor: pointer;
      transition: background 0.3s ease;
    }
    .download-btn:hover {
      background: #005a9e;
    }
  </style>
</head>
<body>
  <div class="doc-card">
    <div class="doc-title">Basic Document</div>
    <button class="download-btn" onclick="downloadFile('./docs/basic.docx')">Download</button>
  </div>

  <div class="doc-card">
    <div class="doc-title">Maths Document</div>
    <button class="download-btn" onclick="downloadFile('./docs/mathsDoc.docx')">Download</button>
  </div>

  <script>
    function downloadFile(path) {
      const link = document.createElement('a');
      link.href = path;
      link.download = path.split('/').pop();
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
    }
  </script>
</body>
</html>
